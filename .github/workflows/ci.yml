name: CI

on:
  push:
    branches:
      - dev
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run lint and unit tests
        run: make lint

      - name: Enforce runtime coverage gate
        run: make coverage-runtime
