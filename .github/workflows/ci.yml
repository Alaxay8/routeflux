name: CI

on:
  push:
    branches:
      - dev
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run lint and unit tests
        run: make lint

      - name: Enforce runtime coverage gate
        run: make coverage-runtime

  integration-openwrt:
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install QEMU and browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils chromium || sudo apt-get install -y qemu-system-x86 qemu-utils chromium-browser

      - name: Detect browser binary
        run: |
          for candidate in chromium chromium-browser google-chrome google-chrome-stable /snap/bin/chromium headless_shell headless-shell chrome; do
            if command -v "$candidate" >/dev/null 2>&1; then
              echo "ROUTEFLUX_OPENWRT_BROWSER_BIN=$(command -v "$candidate")" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "browser binary not found on runner" >&2
          exit 1

      - name: Run OpenWrt integration suite
        run: make test-integration
