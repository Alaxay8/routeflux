name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run lint and unit tests
        run: make lint

      - name: Enforce runtime coverage gate
        run: make coverage-runtime

      - name: Build OpenWrt release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: make package-release VERSION="${VERSION}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          files: |
            dist/*.ipk
            dist/*.tar.gz
            dist/install.sh
            dist/uninstall.sh
